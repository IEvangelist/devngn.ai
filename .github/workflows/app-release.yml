name: App Release

# Builds and publishes the Tauri desktop app for all three platforms on every
# `app-v*` tag push.  The tauri-action creates a draft GitHub Release, uploads
# platform bundles (NSIS/MSI on Windows, .dmg on macOS, AppImage/.deb on Linux),
# and publishes the updater feed (latest.json) to the same release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY          – Ed25519 private key (base64), see DEVOPS.md
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD – passphrase for the private key
#   APPLE_CERTIFICATE                  – base64 Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD         – password for the .p12 export
#   APPLE_API_ISSUER                   – App Store Connect API issuer ID
#   APPLE_API_KEY                      – App Store Connect API key ID
#   APPLE_API_KEY_PRIVATE_KEY          – App Store Connect .p8 private-key contents
#   KEYCHAIN_PASSWORD                  – temporary CI keychain password
#
# Required repository variables:
#   AZURE_ARTIFACT_SIGNING_CLIENT_ID
#   AZURE_ARTIFACT_SIGNING_TENANT_ID
#   AZURE_ARTIFACT_SIGNING_SUBSCRIPTION_ID
#   AZURE_ARTIFACT_SIGNING_ENDPOINT
#   AZURE_ARTIFACT_SIGNING_ACCOUNT
#   AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE
#
# GITHUB_TOKEN is provided automatically; the job is granted `contents: write`
# so the action can create/update the GitHub Release. `id-token: write` lets the
# Windows job use Azure OIDC for Artifact Signing without a client secret.

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
          # Build a native ARM binary on the M-series runner.
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          # Cross-compile an Intel binary from the same macOS runner.
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.platform }} ${{ matrix.args }})

    steps:
      - uses: actions/checkout@v4

      # pnpm reads the `packageManager` field from the root package.json.
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # Pre-register the macOS cross-compilation targets so Rust can use them.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/app/src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            xdg-utils

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Authenticate to Azure Artifact Signing
        if: matrix.platform == 'windows-latest'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_ARTIFACT_SIGNING_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_ARTIFACT_SIGNING_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_ARTIFACT_SIGNING_SUBSCRIPTION_ID }}

      - name: Setup .NET for Windows Artifact Signing
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Configure Windows Artifact Signing
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
        run: apps/app/src-tauri/scripts/setup-windows-signing.ps1

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for macOS Developer ID signing"
              exit 1
            fi
          done

          export certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["certificate_path"]).write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$certificate_path" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$cert_id" ]; then
            echo "::error::No Developer ID Application identity found in imported certificate"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"

      - name: Configure Apple notarization
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PRIVATE_KEY: ${{ secrets.APPLE_API_KEY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for name in APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for macOS notarization"
              exit 1
            fi
          done

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point released desktop builds at the hosted Wellness API. The
          # beforeBuildCommand (`pnpm --filter @devngn/app generate`) reads this
          # env var in nuxt.config.ts; local dev keeps the localhost default.
          NUXT_PUBLIC_API_BASE_URL: https://api.devngn.ai
          # Updater signing — see DEVOPS.md for key generation instructions.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID signing and notarization.
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          # `apps/app` contains src-tauri/ and the beforeBuildCommand runs
          # `pnpm --filter @devngn/app generate` (Nuxt SPA → .output/public).
          projectPath: apps/app
          # Use the pushed tag as-is (e.g. app-v1.2.3).
          tagName: ${{ github.ref_name }}
          releaseName: "devngn ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download and install devngn for your platform.
            The updater feed (`latest.json`) is attached and consumed by the in-app
            auto-updater endpoint configured in tauri.conf.json.
          releaseDraft: true
          prerelease: false
          # Generates and uploads latest.json for the Tauri updater plugin.
          uploadUpdaterJson: true
          args: ${{ matrix.args }}

  # tauri-action publishes version-embedded bundle names (e.g.
  # devngn_1.2.3_aarch64.dmg).  Those are correct for the updater feed, but a
  # marketing "Download" page wants durable URLs.  This job runs once after all
  # platforms finish, downloads the draft release's assets, and re-uploads
  # stable-named alias copies so links like
  # https://github.com/IEvangelist/devngn.ai/releases/latest/download/devngn-macos-aarch64.dmg
  # keep working across every release.  (The original versioned assets — and the
  # updater .sig files + latest.json — are left untouched.)
  alias-assets:
    needs: publish-tauri
    # Only alias when every platform bundle built successfully and the run
    # wasn't cancelled — publishing a partial set would leave dead download
    # links on the marketing page. This makes the implicit success() gate
    # explicit and hardens it against the cancelled() edge case.
    if: ${{ !cancelled() && needs.publish-tauri.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish stable-named alias assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist stable
          # Draft releases are reachable with the workflow token.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dist --clobber

          shopt -s nullglob
          copy_first() {
            local pattern="$1" dest="$2" match
            for match in dist/$pattern; do
              if [ -f "$match" ]; then
                cp "$match" "stable/$dest"
                echo "aliased $(basename "$match") -> $dest"
                return 0
              fi
            done
            echo "::warning::no release asset matched '$pattern' (alias '$dest' skipped)"
          }

          copy_first '*_x64-setup.exe' 'devngn-windows-x64-setup.exe'
          copy_first '*_en-US.msi'     'devngn-windows-x64.msi'
          copy_first '*_aarch64.dmg'   'devngn-macos-aarch64.dmg'
          copy_first '*_x64.dmg'       'devngn-macos-x64.dmg'
          copy_first '*.AppImage'      'devngn-linux-x86_64.AppImage'
          copy_first '*_amd64.deb'     'devngn-linux-amd64.deb'

          if [ -n "$(ls -A stable 2>/dev/null)" ]; then
            gh release upload "$TAG" stable/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "::error::no alias assets were produced"
            exit 1
          fi
